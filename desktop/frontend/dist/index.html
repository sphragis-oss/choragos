<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Choragos</title>
  <link rel="stylesheet" href="vendor/xterm.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="picker" class="screen">
    <header>
      <img class="wordmark" src="brand/logo-wordmark-dark.svg" alt="Choragos" />
      <p class="sub">Attach to a running session, or open a project folder to start one.</p>
    </header>
    <ul id="session-list"></ul>
    <p id="picker-empty" class="empty hidden">No running sessions.</p>
    <div class="open-row">
      <button id="open-project" class="primary">Open project folder…</button>
    </div>
    <div id="setup" class="hidden">
      <p class="dir" id="setup-dir"></p>
      <p class="sub">No team here yet. Pick a starting team:</p>
      <div class="setup-controls">
        <label class="check"><input type="checkbox" id="setup-auto" checked /> Detect the project type automatically</label>
        <select id="setup-template" disabled></select>
        <button id="setup-create" class="primary">Create team and start</button>
      </div>
      <p id="setup-note" class="dim"></p>
    </div>
    <p id="picker-status" class="dim hidden"></p>
    <p id="picker-error" class="error hidden"></p>
    <a id="star-link" class="star" href="#">
      <svg viewBox="0 0 16 16" width="15" height="15" aria-hidden="true"><path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
      <span>Enjoying Choragos? Star it on GitHub</span>
    </a>
  </div>

  <div id="mirror" class="screen hidden">
    <aside id="sidebar">
      <img class="wordmark" src="brand/logo-wordmark-dark.svg" alt="Choragos" />
      <div id="cards"></div>
      <button id="board-btn">Task board</button>
      <button id="detach">Quit, keep agents working</button>
      <button id="stop" class="danger">Stop everything</button>
    </aside>
    <main id="terms"></main>
    <footer id="statusbar">
      <span id="conn-state">connecting…</span>
      <span id="gateway"></span>
      <span id="gate-count"></span>
    </footer>
  </div>

  <div id="gate-modal" class="modal hidden">
    <div class="dialog">
      <h2>Delegation awaiting approval</h2>
      <dl>
        <dt>to</dt><dd id="gate-to"></dd>
        <dt>task</dt><dd id="gate-task"></dd>
        <dt>brief</dt><dd id="gate-brief"></dd>
        <dt>queued</dt><dd id="gate-at"></dd>
      </dl>
      <p id="gate-more" class="dim"></p>
      <div class="actions">
        <button id="gate-approve" class="primary">Approve</button>
        <button id="gate-view">View brief</button>
        <button id="gate-reject" class="danger">Reject</button>
      </div>
    </div>
  </div>

  <div id="board-modal" class="modal hidden">
    <div class="dialog wide">
      <h2>Task board</h2>
      <div id="board-rows"></div>
      <div class="actions"><button id="board-close">Close</button></div>
    </div>
  </div>

  <div id="viewer-modal" class="modal hidden">
    <div class="dialog wide">
      <h2 id="viewer-title"></h2>
      <pre id="viewer-body"></pre>
      <div class="actions"><button id="viewer-close">Close</button></div>
    </div>
  </div>

  <script src="vendor/xterm.js"></script>
  <script src="vendor/addon-fit.js"></script>
  <script src="app.js"></script>
</body>
</html>
