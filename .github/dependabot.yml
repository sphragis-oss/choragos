version: 2
updates:
  - package-ecosystem: "gomod"
    directories:
      - "/"
      - "/desktop"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    groups:
      all-go-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    groups:
      all-actions:
        patterns:
          - "*"
