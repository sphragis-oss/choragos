# Choragos orchestration config. See docs/keybindings.md for the full keymap.

[[roles]]
name = "orchestrator"
command = "claude"
model = "opus"
start = true
prompt_template = "You coordinate the team. Plan and delegate only; never implement, review, or audit yourself."

[[roles]]
name = "coder"
command = "claude"
model = "opus"
# workers skip your personal MCP servers (context hygiene); delete to inherit them
args = ["--strict-mcp-config"]
prompt_template = "Implement the requested change. Run the project's tests before reporting done."

[[roles]]
name = "reviewer"
command = "claude"
model = "sonnet"
args = ["--strict-mcp-config"]
prompt_template = "Review the change for correctness and edge cases. Report findings only; do not modify code."
# extra status heuristics for non-Claude agent TUIs:
# input_prompts = ["continue? <enter>"]
# chrome_markers = ["my statusbar"]

# [sphragis]
# enabled = true        # route agent LLM traffic through the gateway
# fail_closed = true    # refuse delegation when the gateway is down
# addr = "127.0.0.1:8787"

# [keys]                # tmux-style prefix bindings (herdr defaults)
# prefix = "ctrl+b"
# split_vertical = "v"
# split_horizontal = "-"
# close_pane = "x"
# zoom = "z"
# resize_mode = "r"
# toggle_sidebar = "b"
# restart_role = "R"
# reload = "C"
# detach = "d"
# broadcast = "a"
# task_board = "t"
# search = "/"
# help = "?"

# [ui]
# auto_focus = true     # focus the agent that gets a delegation or blocks on input
# sidebar = true        # start with the status-card sidebar visible
# bell = true           # terminal bell when an agent blocks on input
# on_gate = ""          # sh -c command when a delegation awaits approval ($CHORAGOS_ROLE, $CHORAGOS_TASK)
# on_input = ""         # sh -c command when an agent blocks on input ($CHORAGOS_ROLE)

# [ui.theme]            # status colors: ANSI 0-255 or #rrggbb; omitted keys keep the defaults
# accent = "45"         # focused border, overlay titles
# working = "42"        # working dot, gateway up
# waiting = "214"       # waiting for input, approval overlay
# scroll = "213"        # scrollback / search indicators
# idle = "244"          # idle dot
# dim = "240"           # unfocused borders, exited roles
